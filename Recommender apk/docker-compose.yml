
# Local Development Orchestration
# Usage: docker-compose up --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recommender-backend
    ports:
      - "8000:8000"
    environment:
      - DATASET_PATH=final_dataset.csv
    volumes:
      # Mount dataset from project root so backend can read it
      - ./final_dataset.csv:/app/final_dataset.csv:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - recommender-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recommender-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - recommender-net

networks:
  recommender-net:
    driver: bridge

